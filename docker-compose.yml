services:
  db:
    image: postgres:16
    container_name: jobboard_db
    environment:
      POSTGRES_DB: jobsdb
      POSTGRES_USER: jobuser
      POSTGRES_PASSWORD: jobpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobuser -d jobsdb"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: .
    container_name: jobboard_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://jobuser:jobpass@db:5432/jobsdb
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  postgres_data:
